name: Test API Wallapop directa

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install tsx --no-save

      - name: Ejecutar test
        run: npx tsx scripts/test-api-directa.ts
