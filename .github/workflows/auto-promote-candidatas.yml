name: Auto Promote Candidatas

# Promueve palas de palas_candidatas → palas cuando tienen ≥2 fuentes distintas.
# Horario: 08:00 UTC diario

on:
  # [PAUSADO] schedule:
    # [PAUSADO] - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Auto-promover palas candidatas (con log)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          FECHA=$(date -u +"%Y-%m-%d_%H-%M")
          mkdir -p ../../logs/auto-promote
          npx tsx scripts/auto-promote-candidatas.ts 2>&1 | tee ../../logs/auto-promote/${FECHA}.txt

      - name: Commit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git -C ../.. add logs/auto-promote/
          git -C ../.. diff --cached --quiet || git -C ../.. commit -m "log: auto-promote $(date -u +'%Y-%m-%d %H:%M UTC')"
          git -C ../.. push
