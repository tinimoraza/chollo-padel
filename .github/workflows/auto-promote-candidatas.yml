name: Auto Promote Candidatas

# Promueve palas de palas_candidatas → palas cuando tienen ≥2 fuentes distintas.
# Guarda log en logs/auto-promote/ para revisar qué se añadió al catálogo.
# Horario: 08:00 UTC diario

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-promote:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Auto-promover palas candidatas (con log)
        env:
          NEXT_PUBL