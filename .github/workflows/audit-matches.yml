name: Audit Matches

# Audita la calidad de los matches del TOP y CHOLLOS.
# Auto-corrige bad matches: pala_id=NULL en wallapop_cache, disponible=false en price_snapshots.
# Guarda log en logs/audit-matches/ para análisis posterior.
# Horario: 07:00 y 18:00 UTC

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-matches:
    name: Auditar y corregir matches TOP y CHOLLOS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar jq
        run: sudo apt-get install -y jq

      - name: Llamar endpoint audit-matches en Vercel
        run: |
          FECHA=$(date -u +"%Y-%m-%d_%H-%M")
          mkdir -p logs/audit-matches
          LOG=logs/audit-matches/${FECHA}.txt

          echo "⏰ $(date -u '+%Y-%m-%d %H:%M UTC') — Iniciando audit-matches..." | tee "$LOG"

          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "https://www.huntpadel.com/api/cron/audit-matches" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          echo "HTTP status: $STATUS" | tee -a "$LOG"
          echo "" >> "$LOG"

          # Resumen legible con jq
          jq -r '
            "\n=== RESUMEN AUDIT ===",
            "TOP auditados:     \(.topAudited // "?")",
            "CHOLLOS auditados: \(.chollosAudited // "?")",
            "Issues detectados: \([ .logs[]? | select(.action != null and .action != "ok") ] | length)",
            "Auto-correcciones: \([ .logs[]? | select(.action // "" | test("reset")) ] | length)",
            "",
            "--- DETALLE ISSUES ---",
            ( .logs[]? | select(.action != null and .action != "ok") |
              "[\(.check // "")] \(.titulo // "" | .[0:60]) → \(.action // "")" )
          ' /tmp/response.json >> "$LOG" 2>/dev/null || jq . /tmp/response.json >> "$LOG" 2>/dev/null || cat /tmp/response.json >> "$LOG"

          echo "" >> "$LOG"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Error: HTTP $STATUS" | tee -a "$LOG"
            exit 1
          fi

          echo "✅ Audit completado" | tee -a "$LOG"

      - name: Commit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/audit-matches/
          git diff --cached --quiet || git commit -m "log: audit-matches $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
