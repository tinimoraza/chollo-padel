name: Audit Matches

# Audita la calidad de los matches del TOP y CHOLLOS.
# Auto-corrige bad matches: pala_id=NULL en wallapop_cache, disponible=false en price_snapshots.
# Guarda log en logs/audit-matches/ para análisis posterior.
# Horario: 07:00 y 18:00 UTC

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  audit-matches:
    name: Auditar y corregir matches TOP y CHOLLOS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar jq
        run: sudo apt-get install -y jq

      - name: Llamar endpoint audit-matches en Vercel
        run: |
          FECHA=$(date -u +"%Y-%m-%d_%H-%M")
          mkdir -p logs/audit-matches

          echo "=== AUDIT MATCHES - $(date -u) ===" > logs/audit-matches/${FECHA}.txt
          echo "" >> logs/audit-matches/${FECHA}.txt

          STATUS=$(curl -s -o /tmp/audit_response.json -w "%{http_code}" \
            -X GET "https://www.huntpadel.com/api/cron/audit-matches" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            --max-time 300)

          echo "HTTP Status: $STATUS" >> logs/audit-matches/${FECHA}.txt
          echo "" >> logs/audit-matches/${FECHA}.txt

          if [ "$STATUS" = "200" ]; then
            echo "--- RESUMEN ---" >> logs/audit-matches/${FECHA}.txt
            cat /tmp/audit_response.json | jq '{
              top_auditados: .summary.top_auditados,
              chollos_auditados: .summary.chollos_auditados,
              errores: .summary.errores_encontrados,
              warnings: .summary.warnings_encontrados,
              auto_corregidos: .summary.auto_corregidos,
              checks_disparados: .summary.por_check
            }' 2>/dev/null >> logs/audit-matches/${FECHA}.txt || cat /tmp/audit_response.json >> logs/audit-matches/${FECHA}.txt
            echo "" >> logs/audit-matches/${FECHA}.txt
            echo "--- RESPUESTA COMPLETA ---" >> logs/audit-matches/${FECHA}.txt
            cat /tmp/audit_response.json | jq '.' 2>/dev/null >> logs/audit-matches/${FECHA}.txt || cat /tmp/audit_response.json >> logs/audit-matches/${FECHA}.txt
          else
            echo "ERROR: HTTP $STATUS" >> logs/audit-matches/${FECHA}.txt
            cat /tmp/audit_response.json >> logs/audit-matches/${FECHA}.txt
            exit 1
          fi

      - name: Commit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/audit-matches/
          git diff --cached --quiet || git commit -m "log: audit-matches $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
