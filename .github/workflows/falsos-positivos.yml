name: Falsos Positivos

# Corre una vez a la semana (lunes 07:00 UTC) para detectar posibles
# falsos positivos de matching tienda-catalogo (version, peso, lite,
# marca, anio cruzados). Solo reporta en los logs, no modifica nada.
on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}

jobs:
  detectar-falsos-positivos:
    name: "Detectar falsos positivos"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Detectar falsos positivos
        run: npx tsx scripts/detectar-falsos-positivos.ts
