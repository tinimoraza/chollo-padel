name: Scraper Wallapop

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Llamar al scraper en Vercel
        run: |
          echo "🏓 Llamando a HuntPadel scraper — $(date)"

          RESPONSE=$(curl -s -L -w "\n%{http_code}" \
            --max-time 240 \
            "https://huntpadel.com/api/cron/scrape-wallapop?secret=${{ secrets.CRON_SECRET }}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP: $HTTP_CODE"
          echo "Respuesta: $BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Error HTTP $HTTP_CODE"
            exit 1
          fi

          echo "✅ Scraper finalizado — $(date