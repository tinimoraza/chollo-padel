name: Pipeline Tiendas + Chollos (temporal)

# Corre cada 2h (12 veces/día) — fix 2026-07-01: subido de 3h a 2h para
# capturar cambios de precio y chollos con más granularidad. El run completo
# (4 grupos en paralelo + post-pipeline) tarda como mucho ~65 min en el peor
# caso (grupo Playwright 50 min + post-pipeline 15 min) — de sobra por debajo
# de las 2h entre ejecuciones, sin riesgo de solapamiento.
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

# NOTA (fix 2026-06-18): este job era uno solo, secuencial, con las 19+ tiendas
# scrapeadas una detrás de otra → superaba el timeout-minutes: 60 ("the job has
# exceeded the maximum execution time of 1h0m0s"). Se divide en jobs paralelos
# por tipo de scraper (igual que ya hace scrape-precios.yml): grupos fetch/cheerio
# (sin Playwright, rápidos) + 1 grupo Playwright (más lento, solo las que lo
# necesitan). Un job final "post-pipeline" espera a todos con needs+if:always().
#
# NOTA (fix 2026-06-23 #2): el rebalanceo anterior (3 grupos de 8 tiendas)
# seguía agrupando por NÚMERO de tiendas, no por volumen real de productos —
# "Scrape A" tenía las 8 tiendas más grandes del catálogo (padelnuestro 828,
# padelzoom 749, ofertasdepadel 473, padelproshop 398... ~3.133 productos en
# total) mientras que B y C, con el mismo número de tiendas, sumaban mucho
# menos. Por eso ese grupo volvió a superar el timeout-minutes:30 aunque
# tuviera "solo" 8 tiendas como los otros. Causa raíz real, además, NO era
# solo esto: pipeline-tiendas.ts hacía 1-3 consultas a Supabase POR PRODUCTO
# sin caché ni batching (ver fix en pipeline-tiendas.ts/modelo-matching.ts del
# mismo día) — con ese fix ya aplicado, el tiempo por producto baja mucho,
# pero igualmente se rebalancean aquí los grupos por Nº DE PRODUCTOS reales
# (consulta a price_snapshots de los últimos días) en vez de por Nº de
# tiendas, para que ningún grupo futuro vuelva a quedar muy por encima de los
# demás solo por la combinación de tiendas que le toquen. Se añaden también
# misterpadel (fetch/Clerk.io) y tiendapadelpoint (Playwright) — scrapers ya
# existían en el repo pero nunca se habían enganchado a este workflow.

jobs:
  scrape-grupo-a:
    name: "Scrape A: padelnuestro, time2padel, padelproshop, padelspain, padeltienda, tennispoint, padelvice, stockpadel"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Scrape padelnuestro
        run: npx tsx scripts/pipeline-tiendas.ts padelnuestro --no-post
      - name: Scrape time2padel
        run: npx tsx scripts/pipeline-tiendas.ts time2padel --no-post
      - name: Scrape padelproshop
        run: npx tsx scripts/pipeline-tiendas.ts padelproshop --no-post
      - name: Scrape padelspain
        run: npx tsx scripts/pipeline-tiendas.ts padelspain --no-post
      - name: Scrape padeltienda
        run: npx tsx scripts/pipeline-tiendas.ts padeltienda --no-post
      - name: Scrape tennispoint
        run: npx tsx scripts/pipeline-tiendas.ts tennispoint --no-post
      - name: Scrape padelvice
        run: npx tsx scripts/pipeline-tiendas.ts padelvice --no-post
      - name: Scrape stockpadel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts stockpadel --no-post
      - name: Scrape starvie
        run: npx tsx scripts/pipeline-tiendas.ts starvie --no-post

  scrape-grupo-b:
    name: "Scrape B: padelzoom, ofertasdepadel, zonadepadel, padelmarket, padelkiwi, padelstyle, misterpadel"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Scrape padelzoom (catálogo)
        run: npx tsx scripts/pipeline-tiendas.ts padelzoom --no-post
      - name: Scrape ofertasdepadel
        run: npx tsx scripts/pipeline-tiendas.ts ofertasdepadel --no-post
      - name: Scrape zonadepadel
        run: npx tsx scripts/pipeline-tiendas.ts zonadepadel --no-post
      - name: Scrape padelmarket
        run: npx tsx scripts/pipeline-tiendas.ts padelmarket --no-post
      - name: Scrape padelkiwi
        run: npx tsx scripts/pipeline-tiendas.ts padelkiwi --no-post
      - name: Scrape padelstyle
        run: npx tsx scripts/pipeline-tiendas.ts padelstyle --no-post
      - name: Scrape misterpadel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts misterpadel --no-post
      - name: Scrape outletdepadel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts outletdepadel --no-post

  scrape-grupo-c:
    name: "Scrape C: originalpadel, streetpadel, m1padel, justpadel, futurapadelshop, virtualpadel, padelmania, keepadel"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Scrape originalpadel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts originalpadel --no-post
      - name: Scrape streetpadel
        run: npx tsx scripts/pipeline-tiendas.ts streetpadel --no-post
      - name: Scrape m1padel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts m1padel --no-post
      - name: Scrape justpadel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts justpadel --no-post
      - name: Scrape futurapadelshop
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts futurapadelshop --no-post
      - name: Scrape virtualpadel
        run: npx tsx scripts/pipeline-tiendas.ts virtualpadel --no-post
      - name: Scrape padelmania
        run: npx tsx scripts/pipeline-tiendas.ts padelmania --no-post
      - name: Scrape keepadel
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts keepadel --no-post

  scrape-grupo-playwright:
    name: "Scrape Playwright: allforpadel, padeliberico, romasport, tiendapadel5, padelcoronado, tiendapadelpoint"
    runs-on: ubuntu-latest
    timeout-minutes: 50
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Instalar Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Scrape allforpadel
        run: npx tsx scripts/pipeline-tiendas.ts allforpadel --no-post
      - name: Scrape padeliberico
        run: npx tsx scripts/pipeline-tiendas.ts padeliberico --no-post
      - name: Scrape romasport
        run: npx tsx scripts/pipeline-tiendas.ts romasport --no-post
      - name: Scrape tiendapadel5
        run: npx tsx scripts/pipeline-tiendas.ts tiendapadel5 --no-post
      - name: Scrape padelcoronado
        run: npx tsx scripts/pipeline-tiendas.ts padelcoronado --no-post
      - name: Scrape tiendapadelpoint
        continue-on-error: true
        run: npx tsx scripts/pipeline-tiendas.ts tiendapadelpoint --no-post

  post-pipeline:
    name: "Post-pipeline (match + recalcular precios)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [scrape-grupo-a, scrape-grupo-b, scrape-grupo-c, scrape-grupo-playwright]
    if: always()
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Post-pipeline (match + recalcular precios)
        run: npx tsx scripts/post-pipeline.ts

  notificar-chollos:
    name: "Notificar chollos nuevos por Telegram"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [post-pipeline]
    if: always()
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Notificar chollos nuevos por Telegram
        run: npx tsx scripts/notify-chollos-telegram.ts
