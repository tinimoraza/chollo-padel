name: Match Segunda Mano

# Asigna pala_id a los items de wallapop_cache (Wallapop + Vinted) sin match.
# Corre cada 30 min a :15 y :45 — después del scrape de Vinted (:05/:35)
# y antes del Top Oportunidades (:25/:55).

on:
  schedule:
    - cron: '15,45 * * * *'
  workflow_dispatch:

jobs:
  match-segunda-mano:
    name: Asignar pala_id a anuncios sin matchear
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Llamar endpoint match-wallapop en Vercel
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X GET "https://www.huntpadel.com/api/cron/match-wallapop" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          cat /tmp/response.json
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Error: HTTP $STATUS"
            exit 1
          fi
