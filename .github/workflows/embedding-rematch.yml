name: Embedding Rematch

# Aplica el matcher semÃ¡ntico (embeddings) a los anuncios que el fuzzy matcher
# no pudo resolver (no_match, ambiguous). Segunda capa de matching con ML.
# Guarda log en logs/embedding-rematch/ para monitorizaciÃ³n.
# Horario: 07:30 y 18:30 UTC (despuÃ©s del fuzzy match a :15/:45)

on:
  # [PAUSADO] schedule:
    # [PAUSADO] - cron: '30 7 * * *'
    # [PAUSADO] - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  embedding-rematch:
    name: Embedding rematch de items sin match
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: chollo-padel-fase2-v2/chollo-padel-v2/package-lock.json

      - name: Cache modelo de embeddings
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: embedding-model-multilingual-minilm-l12-v2
          restore-keys: embedding-model-

      - name: Install dependencies
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
        run: npm ci

      - name: Regenerar embeddings del catÃ¡logo
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/generate-catalog-embeddings.js

      - name: Run embedding rematch (con log)
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          FECHA=$(date -u +"%Y-%m-%d_%H-%M")
          mkdir -p ../../logs/embedding-rematch
          echo "=== EMBEDDING REMATCH - $(date -u) ===" > ../../logs/embedding-rematch/${FECHA}.txt
          echo "" >> ../../logs/embedding-rematch/${FECHA}.txt
          npx tsx scripts/match-pala-id.ts --method=embedding 2>&1 | tee -a ../../logs/embedding-rematch/${FECHA}.txt
          echo "" >> ../../logs/embedding-rematch/${FECHA}.txt
          echo "=== FIN $(date -u) ===" >> ../../logs/embedding-rematch/${FECHA}.txt

      - name: Commit log
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add logs/embedding-rematch/
          git diff --cached --quiet || git commit -m "log: embedding-rematch $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
