name: Scrape Precios Tiendas

on:
  # Scrape automático desactivado temporalmente — lanzar a mano con workflow_dispatch
  # schedule:
  #   - cron: '0 7 * * *'
  #   - cron: '0 13 * * *'
  #   - cron: '0 19 * * *'
  #   - cron: '0 23 * * *'
  workflow_dispatch:

# Scraper de precios de tiendas — dividido en 3 jobs paralelos.
# NOTA: padelzoom y padelful NO están aquí — son fuentes de catálogo (scrape-catalogo.yml).
#
# Grupo A - padelnuestro
# Grupo B - Playwright set 1 (romasport, padelcoronado, padeliberico, tiendapadelpoint, streetpadel, zonadepadel)
# Grupo C - fetch + Playwright set 2 (padelproshop, tennispoint, padelmarket, miravia, amazon)

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  WORKDIR: chollo-padel-fase2-v2/chollo-padel-v2

jobs:

  # -- Grupo A: Puppeteer -------------------------------------------------------
  # Nota: padelzoom eliminado — ahora es fuente de catálogo (scrape-catalogo.yml),
  # no fuente de precios. Solo padelnuestro aquí.
  scrape-grupo-a:
    name: "Scrape A: padelnuestro"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Scrape Padel Nuestro
        run: node scripts/prices/pipeline.js padelnuestro

  # -- Grupo B: Playwright set 1 ------------------------------------------------
  scrape-grupo-b:
    name: "Scrape B: romasport + padelcoronado + padeliberico + tiendapadelpoint + streetpadel + zonadepadel"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Instalar Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Scrape Roma Sport
        continue-on-error: true
        run: node scripts/prices/pipeline.js romasport
      - name: Scrape Padel Coronado
        continue-on-error: true
        run: node scripts/prices/pipeline.js padelcoronado
      - name: Scrape Padel Iberico
        continue-on-error: true
        run: node scripts/prices/pipeline.js padeliberico
      - name: Scrape Tienda Padel Point
        continue-on-error: true
        run: node scripts/prices/pipeline.js tiendapadelpoint
      - name: Scrape Street Padel
        continue-on-error: true
        run: node scripts/prices/pipeline.js streetpadel
      - name: Scrape Zona de Padel
        continue-on-error: true
        run: node scripts/prices/pipeline.js zonadepadel
      - name: Scrape Ofertas de Padel
        continue-on-error: true
        run: node scripts/prices/pipeline.js ofertasdepadel

  # -- Grupo C: fetch + Playwright set 2 ----------------------------------------
  scrape-grupo-c:
    name: "Scrape C: padelproshop + tennispoint + padelmarket + miravia + amazon"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Instalar Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Scrape Padel Pro Shop
        run: node scripts/prices/pipeline.js padelproshop
      - name: Scrape Tennis-Point ES
        run: node scripts/prices/pipeline.js tennispoint
      - name: Scrape Padel Market
        run: node scripts/prices/pipeline.js padelmarket
      - name: Scrape Miravia
        continue-on-error: true
        run: node scripts/prices/pipeline.js miravia
      - name: Scrape Amazon ES
        continue-on-error: true
        run: node scripts/prices/pipeline.js amazon

  # -- Recalcular top tras todos los scrapes ------------------------------------
  recalcular-top:
    name: Recalcular Top Oportunidades
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scrape-grupo-a, scrape-grupo-b, scrape-grupo-c]
    if: always()
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Recalcular precio_referencia (todas las palas)
        run: node scripts/prices/recalculate-all-references.js
      - name: Recalcular Top Oportunidades
        run: npx tsx scripts/top-oportunidades.ts
