name: Scrape Precios Tiendas

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  scrape-precios:
    name: Scrape precios tiendas
    runs-on: ubuntu-latest
    timeout-minutes: 60  # ampliado de 30 → 60 por los 6 scrapers nuevos
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium

      - name: Limpiar caché con confidence < 0.92 (threshold viejo Jaro-Winkler)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const sb = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SECRET_KEY);
          sb.from('price_match_cache').delete().lt('confidence', 0.92).then(({ error }) => {
            if (error) { console.error('Error limpiando cache:', error.message); process.exit(1); }
            console.log('[cache] Limpieza completada — entradas con conf < 0.92 eliminadas');
          });
          "

      # ── Tiendas existentes ────────────────────────────────────────────────

      - name: Scrape Padel Nuestro
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js padelnuestro

      - name: Scrape PadelZoom
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js padelzoom

      - name: Scrape Roma Sport
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js romasport

      - name: Scrape Padel Coronado
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js padelcoronado

      # ── Tiendas nuevas ────────────────────────────────────────────────────

      - name: Scrape Tennis-Point ES
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js tennispoint

      - name: Scrape Decathlon ES
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js decathlon

      - name: Scrape Padel Pro Shop
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js padelproshop

      - name: Scrape Miravía
        continue-on-error: true  # marketplace con anti-bot — no bloquear el pipeline si falla
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js miravia

      - name: Scrape Amazon ES
        continue-on-error: true  # anti-bot agresivo — no bloquear el pipeline si falla
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js amazon

      - name: Scrape Padel Ibérico
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: node scripts/prices/pipeline.js padeliberico

  recalcular-top:
    name: Recalcular Top Oportunidades
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: scrape-precios
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Instalar dependencias
        run: npm install

      - name: Recalcular Top Oportunidades con precios frescos
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.SUPABASE_SECRET_KEY }}
        run: npx tsx scripts/top-oportunidades.ts
