name: Scrape Precios Tiendas

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
    - cron: '0 23 * * *'
  workflow_dispatch:

# Scraper dividido en 3 jobs paralelos para evitar timeout de 60 min.
# Cada grupo tarda ~15-20 min. Total real: ~25 min en vez de 60+.
#
# Grupo A - Puppeteer (padelnuestro, padelzoom)
# Grupo B - Playwright set 1 (romasport, padelcoronado, padeliberico, tiendapadelpoint)
# Grupo C - fetch + Playwright set 2 (padelproshop, tennispoint, miravia, amazon)

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
  WORKDIR: chollo-padel-fase2-v2/chollo-padel-v2

jobs:

  # -- Grupo A: Puppeteer -------------------------------------------------------
  scrape-grupo-a:
    name: "Scrape A: padelnuestro + padelzoom"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Limpiar cache confianza baja
        run: |
          node -e "
          const { createClient } = require('@supabase/supabase-js');
          const sb = createClient(process.env.NEXT_PUBLIC_SUPABASE_URL, process.env.SUPABASE_SECRET_KEY);
          sb.from('price_match_cache').delete().lt('confidence', 0.92).then(({ error }) => {
            if (error) { console.error('Error limpiando cache:', error.message); process.exit(1); }
            console.log('[cache] Limpieza OK');
          });
          "
      - name: Scrape Padel Nuestro
        run: node scripts/prices/pipeline.js padelnuestro
      - name: Scrape PadelZoom
        run: node scripts/prices/pipeline.js padelzoom

  # -- Grupo B: Playwright set 1 ------------------------------------------------
  scrape-grupo-b:
    name: "Scrape B: romasport + padelcoronado + padeliberico + tiendapadelpoint"
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Instalar Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Scrape Roma Sport
        run: node scripts/prices/pipeline.js romasport
      - name: Scrape Padel Coronado
        run: node scripts/prices/pipeline.js padelcoronado
      - name: Scrape Padel Iberico
        run: node scripts/prices/pipeline.js padeliberico
      - name: Scrape Tienda Padel Point
        run: node scripts/prices/pipeline.js tiendapadelpoint

  # -- Grupo C: fetch + Playwright set 2 ----------------------------------------
  scrape-grupo-c:
    name: "Scrape C: padelproshop + tennispoint + padelmarket + miravia + amazon"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Instalar Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Scrape Padel Pro Shop
        run: node scripts/prices/pipeline.js padelproshop
      - name: Scrape Tennis-Point ES
        run: node scripts/prices/pipeline.js tennispoint
      - name: Scrape Padel Market
        run: node scripts/prices/pipeline.js padelmarket
      - name: Scrape Miravia
        continue-on-error: true
        run: node scripts/prices/pipeline.js miravia
      - name: Scrape Amazon ES
        continue-on-error: true
        run: node scripts/prices/pipeline.js amazon

  # -- Recalcular top tras todos los scrapes ------------------------------------
  recalcular-top:
    name: Recalcular Top Oportunidades
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [scrape-grupo-a, scrape-grupo-b, scrape-grupo-c]
    if: always()
    defaults:
      run:
        working-directory: chollo-padel-fase2-v2/chollo-padel-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Instalar dependencias
        run: npm install
      - name: Recalcular Top Oportunidades
        run: npx tsx scripts/top-oportunidades.ts
