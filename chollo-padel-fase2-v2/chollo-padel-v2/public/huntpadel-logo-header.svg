<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80" width="400" height="80">
  <!-- Círculo icono azul -->
  <circle cx="40" cy="40" r="36" fill="#1673FE"/>

  <!-- Pala de padel (cuerpo) -->
  <ellipse cx="36" cy="28" rx="15" ry="18" fill="white" opacity="0.95"/>
  <!-- Agujeros pala 3x3 -->
  <circle cx="30" cy="22" r="2.2" fill="#1673FE"/>
  <circle cx="37" cy="22" r="2.2" fill="#1673FE"/>
  <circle cx="44" cy="22" r="2.2" fill="#1673FE"/>
  <circle cx="30" cy="29" r="2.2" fill="#1673FE"/>
  <circle cx="37" cy="29" r="2.2" fill="#1673FE"/>
  <circle cx="44" cy="29" r="2.2" fill="#1673FE"/>
  <circle cx="30" cy="36" r="2.2" fill="#1673FE"/>
  <circle cx="37" cy="36" r="2.2" fill="#1673FE"/>
  <circle cx="44" cy="36" r="2.2" fill="#1673FE"/>
  <!-- Mango -->
  <rect x="33" y="45" width="6" height="13" rx="3" fill="white" opacity="0.9"/>
  <!-- Grip -->
  <rect x="33" y="48" width="6" height="1.5" rx="0.75" fill="#1673FE" opacity="0.4"/>
  <rect x="33" y="52" width="6" height="1.5" rx="0.75" fill="#1673FE" opacity="0.4"/>
  <!-- Etiqueta precio -->
  <rect x="45" y="38" width="15" height="15" rx="3" fill="white" transform="rotate(-15 52 45)"/>
  <circle cx="47" cy="41" r="1.3" fill="#1673FE" transform="rotate(-15 52 45)"/>
  <text x="47" y="51" font-family="Arial, sans-serif" font-size="8" font-weight="800" fill="#1673FE" transform="rotate(-15 52 45)">%</text>

  <!-- Texto "Huntpadel" en un solo elemento para evitar separación -->
  <text
    x="88"
    y="54"
    font-family="'Nunito', 'Varela Round', 'Arial Rounded MT Bold', Arial, sans-serif"
    font-size="46"
    font-weight="900"
    letter-spacing="-0.5"
  ><tspan fill="#0B1854">Hunt</tspan><tspan fill="#1673FE">padel</tspan></text>
</svg>
