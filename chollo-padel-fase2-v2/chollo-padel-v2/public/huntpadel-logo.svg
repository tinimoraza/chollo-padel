<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 530 120" width="530" height="120">
  <!-- Círculo icono azul -->
  <circle cx="60" cy="60" r="55" fill="#1673FE"/>

  <!-- Pala de padel (cuerpo) -->
  <ellipse cx="55" cy="44" rx="22" ry="28" fill="white" opacity="0.95"/>
  <!-- Agujeros pala 3x3 -->
  <circle cx="47" cy="36" r="3.5" fill="#1673FE"/>
  <circle cx="57" cy="36" r="3.5" fill="#1673FE"/>
  <circle cx="67" cy="36" r="3.5" fill="#1673FE"/>
  <circle cx="47" cy="46" r="3.5" fill="#1673FE"/>
  <circle cx="57" cy="46" r="3.5" fill="#1673FE"/>
  <circle cx="67" cy="46" r="3.5" fill="#1673FE"/>
  <circle cx="47" cy="56" r="3.5" fill="#1673FE"/>
  <circle cx="57" cy="56" r="3.5" fill="#1673FE"/>
  <circle cx="67" cy="56" r="3.5" fill="#1673FE"/>
  <!-- Mango -->
  <rect x="51" y="70" width="9" height="20" rx="4" fill="white" opacity="0.9"/>
  <!-- Grip stripes -->
  <rect x="51" y="74" width="9" height="2" rx="1" fill="#1673FE" opacity="0.4"/>
  <rect x="51" y="79" width="9" height="2" rx="1" fill="#1673FE" opacity="0.4"/>
  <rect x="51" y="84" width="9" height="2" rx="1" fill="#1673FE" opacity="0.4"/>
  <!-- Etiqueta precio -->
  <rect x="68" y="62" width="22" height="22" rx="4" fill="white" transform="rotate(-15 79 73)"/>
  <circle cx="71" cy="66" r="2" fill="#1673FE" transform="rotate(-15 79 73)"/>
  <text x="72" y="79" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#1673FE" transform="rotate(-15 79 73)">%</text>

  <!-- Texto "Huntpadel" en un solo elemento para evitar separación -->
  <text
    x="130"
    y="78"
    font-family="'Nunito', 'Varela Round', 'Arial Rounded MT Bold', Arial, sans-serif"
    font-size="64"
    font-weight="900"
    letter-spacing="-1"
  ><tspan fill="#0B1854">Hunt</tspan><tspan fill="#1673FE">padel</tspan></text>

  <!-- Tagline -->
  <text
    x="130"
    y="102"
    font-family="Arial, sans-serif"
    font-size="13"
    font-weight="600"
    fill="#0B1854"
    letter-spacing="3.5"
  >UN CHOLLO DE PÁDEL NO ESPERA</text>
</svg>
